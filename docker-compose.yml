services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      FRONTEND_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      LLM_MODE: ${LLM_MODE:-stub}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
