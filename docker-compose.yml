services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    # Load project `.env` into the container. Variables listed under `environment` below override
    # these for the same key—so `OPENAI_API_KEY` is NOT listed there, otherwise a stale shell
    # `export OPENAI_API_KEY=...` would override the value from `.env` when using pass-through.
    env_file:
      - path: .env
        required: false
    environment:
      - FRONTEND_ORIGIN=http://localhost:5173,http://127.0.0.1:5173
      # LLM_MODE must come from env_file (.env) only — do not set it here. A host-interpolated
      # LLM_MODE=${...} overrides .env and can force stub if the shell has a stale LLM_MODE.
      - OPENAI_BASE_URL
      - OPENAI_MODEL
      - OPENAI_JSON_OBJECT

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
